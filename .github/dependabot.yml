version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
    open-pull-requests-limit: 1
    groups:
      ci-weekly:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore(deps)
    open-pull-requests-limit: 1
    groups:
      npm-weekly:
        patterns:
          - "*"

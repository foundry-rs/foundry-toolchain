name: ci

permissions: {}

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**.md"
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        # Note: GitHub does not host Alpine runners, so we skip testing there for now.
        config:
          - { os: ubuntu-latest, arch: x64 } # foundry_v[ersion]_linux_amd64.tar.gz
          - { os: ubuntu-24.04-arm, arch: arm64 } # foundry_v[ersion]_linux_arm64.tar.gz
          - { os: macos-latest, arch: arm64 } # foundry_v[ersion]_darwin_arm64.tar.gz
          - { os: macos-15-intel, arch: x64 } # foundry_v[ersion]_darwin_amd64.tar.gz
          - { os: windows-latest, arch: x64 } # foundry_v[ersion]_windows_amd64.zip
        version: [stable, nightly]
        include:
          # Both with and without `v` prefix.
          - version: 1.5.0
            config:
              os: ubuntu-latest
              arch: x64
          - version: v1.5.0
            config:
              os: ubuntu-latest
              arch: x64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild dist/
        run: pnpm run build

      - name: Test action installation (${{ matrix.version }})
        uses: ./
        with:
          version: ${{ matrix.version }}
          cache: false

      - name: Verify Foundry installation
        shell: bash
        run: |
          forge --version
          cast --version
          anvil --version
          chisel --version

      - name: Test basic Foundry functionality (default)
        shell: bash
        run: |
          forge init test-project --force
          cd test-project
          forge build
          forge test -vvv

      - name: Test basic Foundry functionality (tempo)
        if: matrix.version == 'nightly'
        shell: bash
        run: |
          forge init test-project-tempo -n tempo --force
          cd test-project-tempo
          forge build
          forge test -vvv

  # Canary (non-blocking, NOT part of ci-success): validate that the published Rust
  # `foundryup` RELEASE ARTIFACT (installed via foundryup-init.sh) is behaviorally
  # equivalent to the legacy bash `foundryup`. This is the pre-migration gate: it exercises
  # the exact prebuilt binary + install path users will get, not a source build.
  test-foundryup-rs:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest, arch: x64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
          - { os: macos-latest, arch: arm64 }
          - { os: macos-15-intel, arch: x64 }
          - { os: windows-latest, arch: x64 }
        # Moving channels (stable/nightly) are compared leniently; the pinned version is
        # compared strictly (see the compare step).
        version: [stable, nightly]
        exclude:
          # macOS shared-runner IPs chronically hit GitHub API 403 rate limits when the
          # LEGACY foundryup resolves the nightly tag (unauthenticated; legacy fetch ignores
          # GITHUB_TOKEN). Not a real divergence; the Rust path uses release redirects and is
          # unaffected. ubuntu/windows nightly still run.
          - config: { os: macos-latest, arch: arm64 }
            version: nightly
          - config: { os: macos-15-intel, arch: x64 }
            version: nightly
        include:
          - version: "1.5.0"
            config: { os: ubuntu-latest, arch: x64 }
    env:
      # Pinned foundryup (installer) release to validate. Bump to test a newer release.
      # NOTE: this is the foundryup version, NOT the foundry tool version (matrix.version).
      FOUNDRYUP_RELEASE: "0.0.5"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # 1. Fresh install via the LEGACY bash foundryup (the action's current default path).
      - name: Install (legacy bash foundryup)
        uses: ./
        with:
          version: ${{ matrix.version }}
          cache: false

      - name: Capture legacy manifest + sanity build
        shell: bash
        run: |
          bash .github/scripts/foundry-manifest.sh legacy.txt
          forge init legacy-project --force
          cd legacy-project && forge build && forge test -vvv

      # 2. Install the Rust foundryup from the published release via foundryup-init.sh, ON
      #    TOP of the legacy install (legacy -> Rust migration on the same ~/.foundry).
      #    FOUNDRYUP_VERSION (installer pin) is scoped to the init call only: the foundryup
      #    binary also reads it as the foundry tool version, which would conflict.
      - name: Install (Rust foundryup release via foundryup-init.sh, on top of legacy)
        shell: bash
        run: |
          curl -sSf -L "https://raw.githubusercontent.com/foundry-rs/foundryup/v${FOUNDRYUP_RELEASE}/foundryup-init.sh" -o foundryup-init.sh
          FOUNDRYUP_VERSION="${FOUNDRYUP_RELEASE}" bash foundryup-init.sh -y
          v="${{ matrix.version }}"
          if [ "$v" = "stable" ]; then foundryup; else foundryup --install "${v#v}"; fi

      - name: Capture Rust manifest + post-migration build
        shell: bash
        run: |
          bash .github/scripts/foundry-manifest.sh rust.txt
          forge init rust-project --force
          cd rust-project && forge build && forge test -vvv

      # 3. Assert equivalence of the public contract (tool --version outputs).
      - name: Compare legacy vs Rust foundryup
        shell: bash
        run: |
          echo "::group::legacy manifest"; cat legacy.txt; echo "::endgroup::"
          echo "::group::rust manifest";   cat rust.txt;   echo "::endgroup::"
          if diff -u legacy.txt rust.txt; then
            echo "Manifests match: Rust foundryup release v${FOUNDRYUP_RELEASE} is equivalent for version '${{ matrix.version }}'."
          else
            case "${{ matrix.version }}" in
              stable|nightly)
                echo "::warning::Manifests differ for moving channel '${{ matrix.version }}' (a release may have landed mid-run); not failing."
                ;;
              *)
                echo "::error::Rust foundryup produced a different result than legacy for pinned version '${{ matrix.version }}'."
                exit 1
                ;;
            esac
          fi

  match:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild dist/
        run: pnpm run build

      - name: Compare the expected and actual dist/ directories
        run: |
          if [ "$(git diff --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build.  See status below:"
            git diff
            exit 1
          fi
        id: diff

      # If index.js was different than expected, upload the expected version as an artifact
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && steps.diff.conclusion == 'failure' }}
        with:
          name: dist
          path: dist/

  codeql:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Set up pnpm
        if: matrix.language == 'javascript'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies (JavaScript)
        if: matrix.language == 'javascript'
        run: pnpm install --frozen-lockfile

      - name: Build (JavaScript)
        if: matrix.language == 'javascript'
        run: pnpm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{matrix.language}}"

  ci-success:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test
      - match
      - codeql
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

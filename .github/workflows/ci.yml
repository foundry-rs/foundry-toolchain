name: ci

permissions: {}

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**.md"
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        # Note: GitHub does not host Alpine runners, so we skip testing there for now.
        config:
          - { os: ubuntu-latest, arch: x64 } # foundry_v[ersion]_linux_amd64.tar.gz
          - { os: ubuntu-24.04-arm, arch: arm64 } # foundry_v[ersion]_linux_arm64.tar.gz
          - { os: macos-latest, arch: arm64 } # foundry_v[ersion]_darwin_arm64.tar.gz
          - { os: macos-15-intel, arch: x64 } # foundry_v[ersion]_darwin_amd64.tar.gz
          - { os: windows-latest, arch: x64 } # foundry_v[ersion]_windows_amd64.zip
        version: [stable, nightly]
        include:
          # Both with and without `v` prefix.
          - version: 1.5.0
            config:
              os: ubuntu-latest
              arch: x64
          - version: v1.5.0
            config:
              os: ubuntu-latest
              arch: x64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild dist/
        run: pnpm run build

      - name: Test action installation (${{ matrix.version }})
        uses: ./
        with:
          version: ${{ matrix.version }}
          cache: false

      - name: Verify Foundry installation
        shell: bash
        run: |
          forge --version
          cast --version
          anvil --version
          chisel --version

      - name: Test basic Foundry functionality (default)
        shell: bash
        run: |
          forge init test-project --force
          cd test-project
          forge build
          forge test -vvv

      - name: Test basic Foundry functionality (tempo)
        if: matrix.version == 'nightly'
        shell: bash
        run: |
          forge init test-project-tempo -n tempo --force
          cd test-project-tempo
          forge build
          forge test -vvv

  # Canary (non-blocking, NOT part of ci-success): exercise the Rust `foundryup` rewrite
  # built from source at a pinned commit, and assert it is behaviorally equivalent to the
  # legacy bash `foundryup`. This is the de-risking step before any foundryup release.
  #
  # The Rust foundryup has no nightly/rolling prebuilt artifact (release.yml fires only on
  # tags), so building from source is the only zero-release way to test unreleased master.
  # The trigger is an internal env var (FOUNDRYUP_CANARY_REV), intentionally NOT a public
  # action input, so the "clone + build + run arbitrary code" capability never becomes a
  # supported public API.
  test-foundryup-rs:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest, arch: x64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
          - { os: macos-latest, arch: arm64 }
          - { os: macos-15-intel, arch: x64 }
          - { os: windows-latest, arch: x64 }
        # Moving channels (stable/nightly) are compared leniently; the pinned version is
        # compared strictly (see the compare step).
        version: [stable, nightly]
        include:
          - version: "1.5.0"
            config: { os: ubuntu-latest, arch: x64 }
    env:
      # Pinned foundryup commit to build from. Bump deliberately to test newer master.
      FOUNDRYUP_REV: "7c39ace77886dc6f4c7f9b20071c98c25c7d8680"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      # foundryup is edition 2024 / rust-version 1.85; don't trust the runner's default.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: foundryup-${{ env.FOUNDRYUP_REV }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild dist/
        run: pnpm run build

      # 1. Fresh install via the LEGACY bash foundryup.
      - name: Install (legacy bash foundryup)
        uses: ./
        with:
          version: ${{ matrix.version }}
          cache: false

      - name: Capture legacy manifest + sanity build
        shell: bash
        run: |
          bash .github/scripts/foundry-manifest.sh legacy.txt
          forge init legacy-project --force
          cd legacy-project && forge build && forge test -vvv

      # 2. Install the Rust foundryup ON TOP of the legacy install (legacy -> Rust
      #    migration on the same ~/.foundry, the highest-value real-world case).
      - name: Install (Rust foundryup from source, migration on top of legacy)
        uses: ./
        env:
          FOUNDRYUP_CANARY_REV: ${{ env.FOUNDRYUP_REV }}
          FOUNDRYUP_CANARY_REPO: foundry-rs/foundryup
        with:
          version: ${{ matrix.version }}
          cache: false

      - name: Capture Rust manifest + post-migration build
        shell: bash
        run: |
          bash .github/scripts/foundry-manifest.sh rust.txt
          forge init rust-project --force
          cd rust-project && forge build && forge test -vvv

      # 3. Assert equivalence of the public contract (tool --version outputs).
      - name: Compare legacy vs Rust foundryup
        shell: bash
        run: |
          echo "::group::legacy manifest"; cat legacy.txt; echo "::endgroup::"
          echo "::group::rust manifest";   cat rust.txt;   echo "::endgroup::"
          if diff -u legacy.txt rust.txt; then
            echo "Manifests match: Rust foundryup is equivalent for version '${{ matrix.version }}'."
          else
            case "${{ matrix.version }}" in
              stable|nightly)
                echo "::warning::Manifests differ for moving channel '${{ matrix.version }}' (a release may have landed mid-run); not failing."
                ;;
              *)
                echo "::error::Rust foundryup produced a different result than legacy for pinned version '${{ matrix.version }}'."
                exit 1
                ;;
            esac
          fi

  match:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild dist/
        run: pnpm run build

      - name: Compare the expected and actual dist/ directories
        run: |
          if [ "$(git diff --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build.  See status below:"
            git diff
            exit 1
          fi
        id: diff

      # If index.js was different than expected, upload the expected version as an artifact
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && steps.diff.conclusion == 'failure' }}
        with:
          name: dist
          path: dist/

  codeql:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Set up pnpm
        if: matrix.language == 'javascript'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Set up Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies (JavaScript)
        if: matrix.language == 'javascript'
        run: pnpm install --frozen-lockfile

      - name: Build (JavaScript)
        if: matrix.language == 'javascript'
        run: pnpm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: "/language:${{matrix.language}}"

  ci-success:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test
      - match
      - codeql
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
